<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agregar Producto</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="main-small">
    <header>
        <h1>Registrar Producto</h1>
        <p>Ingrese los datos para el producto</p>
    </header>
    <section>
        <form id="productoForm" th:action="@{/producto/guardar}" th:object="${producto}" method="post">
            <div class="form-group">
                <label for="nombre">
                    Nombre del Producto
                </label>
                <input type="text"
                       id="nombre"
                       name="nombre_producto"
                       th:field="*{nombre_producto}"
                       required>
            </div>
            <div class="form-group">
                <label for="precio">
                    Precio
                </label>
                <input type="number"
                       id="precio"
                       name="precio"
                       th:field="*{precio}"
                       step="0.01"
                       min="0.01"
                       pattern="^\d+(\.\d{1,2})?$"
                       placeholder="0.00"
                       required>
            </div>

            <div class="form-group">
                <label for="stock">
                    Stock
                </label>
                <input type="number"
                       id="stock"
                       name="stock"
                       th:field="*{stock}"
                       step="1"
                       min="1"
                       pattern="^[1-9]\d*$"
                       required>
            </div>

            <Siv class="form-group">
                <label for="estado">Estado</label>
                <select id="estado" name="estado" th:field="*{estado}">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
            </Siv>

            <button type="submit">
                Agregar producto
            </button>

            <nav>
                <a href="/producto/lista">Listar productos</a>
            </nav>
        </form>

    </section>

    <footer>
        <p>KinalApp</p>
    </footer>
</main>
</body>
</html>
