<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nueva Venta</title>
    <link rel="icon" type="image/png" href="/images/logoapp.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="main-small">
    <header>
        <div class="header-logo">
            <img src="/images/logoapp.png" alt="KinalApp Logo" class="logo-img">
            <div class="header-content">
                <h1>Nueva Venta</h1>
                <p>Ingrese los datos de la venta</p>
            </div>
        </div>
        <nav>
            <a href="/inicio" class="button">← Volver al Inicio</a>
        </nav>
    </header>

    <div th:if="${error}" class="mensaje-error" th:text="${error}"></div>

    <section>
        <form method="post" th:action="@{/venta/guardar}">
            <div class="form-group">
                <label for="cliente">Cliente</label>
                <select id="cliente" name="clienteDpi" required>
                    <option value="">Seleccione un cliente</option>
                    <option th:each="cliente : ${clientes}"
                            th:value="${cliente.dpi_Cliente}"
                            th:text="${cliente.nombreCliente} + ' ' + ${cliente.apellidoCliente} + ' (DPI: ' + ${cliente.dpi_Cliente} + ')'">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Usuario</label>
                <input type="text" th:value="${usuarioSesion.username}" disabled style="background: #e9ecef;">
            </div>

            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" name="fecha" required>
            </div>

            <div class="form-group">
                <label for="estado">Estado</label>
                <select id="estado" name="estado">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
            </div>

            <div class="form-group">
                <label for="total">Total</label>
                <input type="number" id="total" name="total" step="0.01" min="0" placeholder="0.00" required>
            </div>

            <button type="submit">Crear Venta</button>

            <nav style="margin-top: 10px;">
                <a href="/venta/lista" style="background: #6c757d;">← Volver a Ventas</a>
            </nav>
        </form>
    </section>

    <footer>
        <img src="/images/logoapp.png" alt="KinalApp" class="footer-logo">
        <p>KinalApp</p>
    </footer>
</main>
</body>
</html>
