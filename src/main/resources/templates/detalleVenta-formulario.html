<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agregar Detalle de Venta - KinalApp</title>
    <link rel="icon" type="image/png" href="/images/logoapp.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="main-small">
    <header>
        <div class="header-logo">
            <img src="/images/logoapp.png" alt="KinalApp Logo" class="logo-img">
            <div class="header-content">
                <h1>Agregar Detalle de Venta</h1>
                <p>Ingrese los datos del detalle</p>
            </div>
        </div>
        <nav>
            <a href="/inicio" class="button">← Volver al Inicio</a>
        </nav>
    </header>

    <div th:if="${error}" class="mensaje-error" th:text="${error}"></div>

    <section>
        <form method="post" th:action="@{/detalleVenta/guardar}">
            <div class="form-group">
                <label>Venta</label>
                <input type="text" th:value="'Venta #' + ${venta.codigo_venta} + ' - Cliente: ' + ${venta.cliente.nombreCliente} + ' ' + ${venta.cliente.apellidoCliente}" disabled style="background: #e9ecef;">
                <input type="hidden" name="ventaCodigo" th:value="${venta.codigo_venta}">
            </div>

            <div class="form-group">
                <label for="producto">Producto</label>
                <select id="producto" name="productoCodigo" required>
                    <option value="">Seleccione un producto</option>
                    <option th:each="producto : ${productos}"
                            th:value="${producto.codigo_producto}"
                            th:text="${producto.nombre_producto} + ' - Q' + ${#numbers.formatDecimal(producto.precio, 1, 2)} + ' (Stock: ' + ${producto.stock} + ')'">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="cantidad">Cantidad</label>
                <input type="number" id="cantidad" name="cantidad" step="1" min="1" required>
            </div>

            <button type="submit">Guardar Detalle</button>

            <nav style="margin-top: 10px;">
                <a href="/detalleVenta/lista" style="background: #6c757d;">← Volver a Detalles</a>
            </nav>
        </form>
    </section>

    <footer>
        <img src="/images/logoapp.png" alt="KinalApp" class="footer-logo">
        <p>KinalApp - Sistema de Gestión de Ventas © 2024</p>
        <p style="font-size: 11px; margin-top: 5px;">Versión 1.0 | Todos los derechos reservados</p>
    </footer>
</main>
</body>
</html>
