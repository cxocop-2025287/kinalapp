<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Editar Producto</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="main-small">
  <header>
    <h1>Editar Producto</h1>
    <p>Cambie los datos del producto</p>
  </header>
  <div th:if="${mensaje}" class="mensaje-exito" th:text="${mensaje}"></div>
  <div th:if="${error}" class="mensaje-error" th:text="${error}"></div>

  <section>
    <form th:action="@{/producto/actualizar/{codigo}(codigo=${producto.codigo_producto})}"
          th:object="${producto}"
          method="post">
      <div class="form-group">
        <label>Código del Producto</label>
        <input type="text"
               th:value="${producto.codigo_producto}"
               disabled>
      </div>
      <div class="form-group">
        <label for="nombre">Nombre del Producto</label>
        <input type="text"
               id="nombre"
               name="nombre_producto"
               th:value="${producto.nombre_producto}"
               required>
      </div>
      <div class="form-group">
        <label for="precio">Precio</label>
        <input type="number"
               id="precio"
               name="precio"
               th:value="${producto.precio}"
               step="0.01"
               min="0.01"
               required>
      </div>

      <div class="form-group">
        <label for="stock">Stock</label>
        <input type="number"
               id="stock"
               name="stock"
               th:value="${producto.stock}"
               step="1"
               min="0"
               required>
      </div>
      <div class="form-group">
        <label for="estado">Estado</label>
        <select id="estado" name="estado">
          <option value="1" th:selected="${producto.estado == 1}">Activo</option>
          <option value="0" th:selected="${producto.estado == 0}">Inactivo</option>
        </select>
      </div>
      <div class="acciones">
        <button type="submit" class="button">Actualizar Producto</button>
        <button type="button" onclick="window.location.href='/producto/lista'">
          Cancelar
        </button>
      </div>
    </form>
  </section>
  <footer>
    <p>KinalApp</p>
  </footer>

</main>

</body>
</html>
