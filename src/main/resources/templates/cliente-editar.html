<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Editar Cliente </title>
    <link rel="icon" type="image/png" href="/images/logoapp.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="main-small">
    <header>
        <div class="header-logo">
            <img src="/images/logoapp.png" alt="KinalApp Logo" class="logo-img">
            <div class="header-content">
                <h1>Editar Cliente</h1>
                <p>Modifique los datos del cliente</p>
            </div>
        </div>
        <nav>
            <a href="/inicio" class="button">← Volver al Inicio</a>
        </nav>
    </header>

    <div th:if="${mensaje}" class="mensaje-exito" th:text="${mensaje}"></div>
    <div th:if="${error}" class="mensaje-error" th:text="${error}"></div>

    <section>
        <form th:action="@{/cliente/actualizar/{dpi}(dpi=${cliente.dpi_Cliente})}"
              th:object="${cliente}"
              method="post">

            <div class="form-group">
                <label>DPI del Cliente</label>
                <input type="text"
                       th:value="${cliente.dpi_Cliente}"
                       disabled
                       style="background: #e9ecef;">
            </div>

            <div class="form-group">
                <label for="nombre">Nombre del Cliente *</label>
                <input type="text"
                       id="nombre"
                       name="nombreCliente"
                       th:value="${cliente.nombreCliente}"
                       required>
            </div>

            <div class="form-group">
                <label for="apellido">Apellido del Cliente *</label>
                <input type="text"
                       id="apellido"
                       name="apellidoCliente"
                       th:value="${cliente.apellidoCliente}"
                       required>
            </div>

            <div class="form-group">
                <label for="direccion">Dirección del Cliente *</label>
                <input type="text"
                       id="direccion"
                       name="direccionCliente"
                       th:value="${cliente.direccionCliente}"
                       required>
            </div>

            <div class="form-group">
                <label for="estado">Estado</label>
                <select id="estado" name="estado">
                    <option value="1" th:selected="${cliente.estado == 1}">Activo</option>
                    <option value="0" th:selected="${cliente.estado == 0}">Inactivo</option>
                </select>
            </div>

            <button type="submit"> Actualizar Cliente</button>

            <nav style="margin-top: 10px;">
                <a href="/cliente/lista" style="background: #6c757d;">← Volver a Clientes</a>
            </nav>
        </form>
    </section>

    <footer>
        <img src="/images/logoapp.png" alt="KinalApp" class="footer-logo">
        <p>KinalApp</p>
    </footer>
</main>
</body>
</html>
